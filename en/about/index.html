<body data-page="about">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="site-header"></div>

  <div class="noir-frame">
    <main id="main-content">
      <section class="section">
        <div class="container container-lg">
          <div class="section-header" data-reveal>
            <span class="section-eyebrow">About</span>
            <h1 class="section-title">About Me</h1>
          </div>

          <!-- Bio -->
          <div class="bio-section" data-reveal>
            <div class="bio-photo">
              <img src="/images/profile.webp" alt="Sakae Shunsuke" loading="lazy">
            </div>
            <div class="bio-content">
              <h2>Bio</h2>
              <p id="profile-bio" class="bio-text"></p>
              <div class="skills-block" id="skills-block"></div>
            </div>
          </div>

          <!-- Values -->
          <div class="block">
            <h2 class="bracket-label" style="display:inline-block; margin-bottom: var(--space-6);">Values</h2>
            <div id="values" class="grid grid-3"></div>
          </div>

          <div class="filmstrip" aria-hidden="true"></div>

          <!-- Expertise -->
          <div class="block">
            <h2 class="bracket-label" style="display:inline-block; margin-bottom: var(--space-6);">Expertise</h2>
            <div id="expertise" class="grid grid-2"></div>
          </div>

          <div class="filmstrip" aria-hidden="true"></div>

          <!-- Timeline -->
          <div class="block">
            <h2 class="bracket-label" style="display:inline-block; margin-bottom: var(--space-6);">Timeline</h2>
            <div id="timeline" style="max-width: 820px;"></div>
          </div>

          <!-- AWS Services -->
          <div class="block">
            <h2 class="bracket-label" style="display:inline-block; margin-bottom: var(--space-6);">AWS Services</h2>
            <div id="aws-services" class="skills-block" style="margin-top:0;"></div>
          </div>

          <!-- Certifications -->
          <div class="block">
            <h2 class="bracket-label" style="display:inline-block; margin-bottom: var(--space-6);">Certifications</h2>
            <ul id="certifications" class="cert-list"></ul>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="container">
          <div class="viewfinder" style="max-width: 760px; margin: 0 auto; text-align: center;" data-reveal>
            <h2 class="section-title">Let's Work Together</h2>
            <p class="section-subtitle" style="margin: 0 auto var(--space-8);">Feel free to reach out.</p>
            <a href="/en/contact/" class="btn btn-primary">Contact me</a>
          </div>
        </div>
      </section>
    </main>
    <div id="site-footer"></div>
  </div>

  <script src="/js/main.js?v=20260614"></script>
  <script src="/js/components.js?v=20260612"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const data = await DataLoader.load('profile.json');
      if (!data) return;

      const bioEl = document.getElementById('profile-bio');
      if (bioEl) bioEl.textContent = data.bio || '';

      // Skills grouped with years
      const groups = [
        { label: 'Languages', items: data.skills?.languages },
        { label: 'Frameworks', items: data.skills?.frameworks },
        { label: 'Infrastructure / DB', items: data.skills?.infrastructure }
      ];
      const skillsBlock = document.getElementById('skills-block');
      if (skillsBlock) {
        skillsBlock.innerHTML = groups.filter(g => g.items?.length).map(g => `
          <h3>${g.label}</h3>
          <div class="skills-grid">
            ${g.items.map(s => `<span class="skill-badge">${Utils.escapeHtml(s.name)}<span class="skill-years">${Utils.escapeHtml(s.years || '')}</span></span>`).join('')}
          </div>
        `).join('');
      }

      Components.renderItems('values', data.values || [], Components.createValueCard);
      Components.renderItems('expertise', data.expertise || [], Components.createValueCard);
      Components.renderItems('timeline', data.timeline || [], Components.createTimelineItem);

      // AWS services (core / integration / AI-ML)
      const aws = data.skills?.awsServices;
      const awsEl = document.getElementById('aws-services');
      if (awsEl && aws) {
        const cats = [
          { label: 'Core', items: aws.core },
          { label: 'Integration', items: aws.integration },
          { label: 'AI/ML & Analytics', items: aws.aiml }
        ];
        awsEl.innerHTML = cats.filter(c => c.items?.length).map(c => `
          <h3>${c.label}</h3>
          <div class="skills-grid">
            ${c.items.map(s => `<span class="skill-badge">${Utils.escapeHtml(s)}</span>`).join('')}
          </div>
        `).join('');
      }

      // Certifications (with acquisition date)
      const certEl = document.getElementById('certifications');
      if (certEl && data.certifications) {
        certEl.innerHTML = data.certifications.map(c => {
          const name = typeof c === 'string' ? c : (c.name || '');
          const date = (c && typeof c === 'object' && c.date) ? c.date : '';
          return `<li>${Utils.escapeHtml(name)}${date ? `<span class="cert-date">${Utils.escapeHtml(date)}</span>` : ''}</li>`;
        }).join('');
      }
    });
  </script>
</body>
</html>
