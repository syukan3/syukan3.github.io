  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const writing = await DataLoader.getWriting();
      const sortByDate = (a, b) => new Date(b.date) - new Date(a.date);
      Components.renderItems('pinned-writing', writing.filter(w => w.pinned).sort(sortByDate), Components.createWritingItem);
      Components.renderItems('recent-writing', writing.filter(w => !w.pinned).sort(sortByDate), Components.createWritingItem);
    });
