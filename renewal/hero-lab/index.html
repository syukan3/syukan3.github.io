<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#0b0a08">
  <title>Hero Lab - 栄 俊介 | ヒーロー案の比較</title>

  <link rel="icon" type="image/svg+xml" href="/renewal/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Shippori+Mincho:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/renewal/css/reset.css?v=20260611">
  <link rel="stylesheet" href="/renewal/css/variables.css?v=20260611">

  <style>
    html, body {
      height: 100%;
      overflow: hidden;
      background: #0b0a08;
      touch-action: none;
      overscroll-behavior: none;
    }
    body {
      font-family: var(--font-sans);
      color: var(--color-text-primary);
      -webkit-font-smoothing: antialiased;
    }
    #lab-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }
    .lab-back {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 14px);
      left: 18px;
      z-index: 30;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      color: rgba(243, 236, 220, 0.55);
      text-decoration: none;
      padding: 8px 10px;
    }
    .lab-back:hover { color: var(--color-ember-bright); }

    .lab-stage {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      pointer-events: none;
    }
    .lab-inner {
      width: 100%;
      max-width: var(--container-xl);
      margin: 0 auto;
      padding-left: max(var(--container-padding), env(safe-area-inset-left, 0px));
      padding-right: max(var(--container-padding), env(safe-area-inset-right, 0px));
    }
    .lab-kicker {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-ember-bright);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: clamp(var(--space-5), 2.6vh, var(--space-8));
    }
    .lab-kicker::before {
      content: '';
      width: 44px;
      height: 1px;
      background: linear-gradient(90deg, var(--color-ember), transparent);
      flex-shrink: 0;
    }
    .lab-title {
      font-family: var(--font-display);
      font-size: var(--text-display);
      font-weight: 600;
      line-height: 1.18;
      letter-spacing: 0.02em;
      color: var(--color-cream);
      margin-bottom: clamp(var(--space-5), 3vh, var(--space-8));
      text-wrap: balance;
    }
    .lab-title .accent {
      color: var(--color-ember-bright);
      text-shadow: 0 0 44px rgba(224, 164, 90, 0.45);
    }
    .lab-lead {
      font-size: clamp(var(--text-base), 0.95rem + 0.5vw, var(--text-lg));
      color: var(--color-text-secondary);
      line-height: 1.9;
      max-width: 44ch;
      margin-bottom: clamp(var(--space-6), 3.4vh, var(--space-9, 2.25rem));
    }
    .lab-actions { display: flex; gap: var(--space-4); flex-wrap: wrap; pointer-events: auto; }
    .lab-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 32px;
      font-size: var(--text-sm);
      font-weight: 600;
      border-radius: 999px;
      letter-spacing: 0.06em;
      min-height: 48px;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .lab-btn-primary {
      background: linear-gradient(180deg, var(--color-ember-bright) 0%, var(--color-ember) 55%, var(--color-ember-dark) 100%);
      color: var(--color-black);
      border: 1px solid rgba(255, 220, 170, 0.4);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.4), 0 0 20px rgba(224, 164, 90, 0.35);
    }
    .lab-btn-primary:hover { transform: translateY(-2px); }
    .lab-btn-secondary {
      background-color: rgba(255, 255, 255, 0.04);
      color: var(--color-text-primary);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    /* Variant C (particles) hides the HTML title — the particles ARE the title */
    body[data-variant="particles"] .lab-title { visibility: hidden; }

    /* Switcher */
    .lab-switch {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 18px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .lab-switch-row { display: flex; gap: 8px; }
    .lab-chip {
      white-space: nowrap;
      padding: 10px 18px;
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      color: rgba(243, 236, 220, 0.6);
      background: rgba(12, 11, 9, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }
    .lab-chip:hover { color: var(--color-cream); }
    .lab-chip[aria-pressed="true"] {
      color: #1b130a;
      background: linear-gradient(180deg, var(--color-ember-bright), var(--color-ember));
      border-color: rgba(255, 220, 170, 0.5);
      font-weight: 600;
    }
    .lab-hint {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      color: rgba(243, 236, 220, 0.4);
      text-align: center;
    }
    @media (max-width: 480px) {
      .lab-chip { padding: 9px 13px; font-size: 11px; }
    }
  </style>
</head>
<body data-variant="fluid">
  <canvas id="lab-canvas"></canvas>

  <a class="lab-back" href="/renewal/">← BACK TO SITE</a>

  <div class="lab-stage">
    <div class="lab-inner">
      <p class="lab-kicker">栄 俊介 / Sakae Shunsuke — AI Governance Architect・システム部長</p>
      <h1 class="lab-title" id="lab-title">
        <span class="lab-line">攻めのAIを、</span><br>
        <span class="lab-line"><span class="accent">守りの統制</span>で。</span>
      </h1>
      <p class="lab-lead">
        金融グレードの統制（FISC・J-SOX）の下で、生成AIを経営の武器に変える。
      </p>
      <div class="lab-actions">
        <a href="/renewal/work/" class="lab-btn lab-btn-primary">ケーススタディを見る</a>
        <a href="/renewal/contact/" class="lab-btn lab-btn-secondary">相談する</a>
      </div>
    </div>
  </div>

  <div class="lab-switch">
    <div class="lab-switch-row">
      <button class="lab-chip" data-variant="fluid" aria-pressed="true">A 墨流しの光</button>
      <button class="lab-chip" data-variant="particles" aria-pressed="false">B 粒子の書</button>
      <button class="lab-chip" data-variant="spotlight" aria-pressed="false">C 暗室の光</button>
    </div>
    <p class="lab-hint" id="lab-hint">ドラッグで光を流す ・ タップで滲む</p>
  </div>

  <script src="/renewal/hero-lab/lab.js?v=20260611"></script>
</body>
</html>
