  <meta property="og:type" content="website">

  <meta property="og:image" content="https://syukan3.github.io/renewal/images/og-image.png">

  <meta name="theme-color" content="#0b0a08">
  <title>Work - 栄 俊介 | Sakae Shunsuke</title>

  <link rel="icon" type="image/svg+xml" href="/renewal/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Shippori+Mincho:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/renewal/css/reset.css?v=20260611">
  <link rel="stylesheet" href="/renewal/css/variables.css?v=20260611">
  <link rel="stylesheet" href="/renewal/css/base.css?v=20260611">
  <link rel="stylesheet" href="/renewal/css/components.css?v=20260611">
</head>
<body data-page="work">
  <a href="#main-content" class="skip-link">メインコンテンツへスキップ</a>
  <div id="site-header"></div>

  <div class="noir-frame">
    <main id="main-content">
      <section class="section">
        <div class="container container-lg">
          <div class="section-header" data-reveal>
            <span class="section-eyebrow">Case Studies</span>
            <h1 class="section-title">Work</h1>
            <p class="section-subtitle">課題解決から実装・成果までのケーススタディ。背景・制約・打ち手・成果・学びの順でまとめています。</p>
          </div>
          <div id="case-studies"></div>
        </div>
      </section>
    </main>
    <div id="site-footer"></div>
  </div>

  <script src="/renewal/js/main.js?v=20260611"></script>
  <script src="/renewal/js/components.js?v=20260611"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const container = document.getElementById('case-studies');
      container.innerHTML = '<div class="case-study"><div class="case-media skeleton" style="height:280px;"></div></div>';

      const works = await DataLoader.getWorks();
      if (!works.length) {
        container.innerHTML = '<p class="text-muted">ケーススタディがありません</p>';
        return;
      }
      container.innerHTML = works.map(w => Components.createCaseStudy(w)).join('');
      if (window.ScrollAnimation) ScrollAnimation.refresh();

      if (window.location.hash) {
        const target = document.querySelector(window.location.hash);
        if (target) setTimeout(() => target.scrollIntoView({ behavior: 'smooth', block: 'start' }), 120);
      }
    });
  </script>
</body>
</html>
