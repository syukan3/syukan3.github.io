<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Writing & Talks - 記事・登壇一覧">
  <meta name="keywords" content="記事, 登壇, 技術発信">

  <meta property="og:title" content="Writing & Talks - Portfolio">
  <meta property="og:description" content="技術記事・登壇一覧">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://syukan3.github.io/renewal/writing/">

  <title>Writing & Talks - Portfolio</title>

  <link rel="icon" type="image/svg+xml" href="/renewal/favicon.svg">

  <link rel="stylesheet" href="/renewal/css/reset.css">
  <link rel="stylesheet" href="/renewal/css/variables.css">
  <link rel="stylesheet" href="/renewal/css/base.css">
  <link rel="stylesheet" href="/renewal/css/components.css">
</head>
<body>
  <header class="header">
    <div class="container header-container">
      <a href="/renewal/" class="logo">Portfolio</a>

      <button class="menu-toggle" aria-label="メニューを開く" aria-expanded="false">
        ☰
      </button>

      <nav>
        <ul class="nav-list">
          <li><a href="/renewal/" class="nav-link">Home</a></li>
          <li><a href="/renewal/work/" class="nav-link">Work</a></li>
          <li><a href="/renewal/projects/" class="nav-link">Projects</a></li>
          <li><a href="/renewal/writing/" class="nav-link">Writing</a></li>
          <li><a href="/renewal/about/" class="nav-link">About</a></li>
          <li><a href="/renewal/photo/" class="nav-link">Photo</a></li>
          <li><a href="/renewal/contact/" class="nav-link">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container">
        <div class="section-header">
          <h1 class="section-title">Writing & Talks</h1>
          <p class="section-subtitle">技術記事・登壇一覧</p>
        </div>

        <!-- Pinned -->
        <div style="margin-bottom: var(--space-16);">
          <h2 style="font-size: var(--text-3xl); margin-bottom: var(--space-8);">Pinned</h2>
          <div id="pinned-writing" class="grid grid-3">
            <!-- Loaded by JavaScript -->
          </div>
        </div>

        <!-- Recent -->
        <div class="film-border">
          <h2 style="font-size: var(--text-3xl); margin-bottom: var(--space-8);">Recent</h2>
          <div id="recent-writing" class="grid grid-3">
            <!-- Loaded by JavaScript -->
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-section">
          <h3 class="footer-title">Navigate</h3>
          <div class="footer-links">
            <a href="/renewal/" class="footer-link">Home</a>
            <a href="/renewal/work/" class="footer-link">Work</a>
            <a href="/renewal/projects/" class="footer-link">Projects</a>
            <a href="/renewal/writing/" class="footer-link">Writing</a>
            <a href="/renewal/about/" class="footer-link">About</a>
            <a href="/renewal/contact/" class="footer-link">Contact</a>
          </div>
        </div>

        <div class="footer-section">
          <h3 class="footer-title">Connect</h3>
          <div class="footer-links">
            <a href="https://github.com/username" target="_blank" rel="noopener noreferrer" class="footer-link">GitHub</a>
            <a href="https://twitter.com/username" target="_blank" rel="noopener noreferrer" class="footer-link">Twitter</a>
            <a href="https://linkedin.com/in/username" target="_blank" rel="noopener noreferrer" class="footer-link">LinkedIn</a>
          </div>
        </div>

        <div class="footer-section">
          <h3 class="footer-title">Info</h3>
          <p class="text-muted" style="font-size: var(--text-sm);">
            Toy Camera Noir<br>
            Portfolio 2024
          </p>
        </div>
      </div>

      <div class="footer-bottom">
        <p>&copy; 2024 Your Name. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="/renewal/js/main.js"></script>
  <script src="/renewal/js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      Components.showSkeleton('pinned-writing', 3);
      Components.showSkeleton('recent-writing', 6);

      const writing = await DataLoader.getWriting();

      const pinned = writing.filter(w => w.pinned);
      const recent = writing.filter(w => !w.pinned);

      Components.renderItems('pinned-writing', pinned, Components.createWritingItem);
      Components.renderItems('recent-writing', recent, Components.createWritingItem);
    });
  </script>
</body>
</html>
