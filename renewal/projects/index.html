<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="栄 俊介の開発プロジェクト一覧 - Censify, Gaugenix, MosaicAI, OmniOCRなど">
  <meta name="keywords" content="栄俊介, プロジェクト, 開発, 実績">

  <meta property="og:title" content="Projects - 栄 俊介 | Sakae Shunsuke">
  <meta property="og:description" content="開発プロジェクト一覧">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://syukan3.github.io/renewal/projects/">

  <title>Projects - 栄 俊介 | Sakae Shunsuke</title>

  <link rel="icon" type="image/svg+xml" href="/renewal/favicon.svg">

  <link rel="stylesheet" href="/renewal/css/reset.css">
  <link rel="stylesheet" href="/renewal/css/variables.css">
  <link rel="stylesheet" href="/renewal/css/base.css">
  <link rel="stylesheet" href="/renewal/css/components.css">
</head>
<body>
  <header class="header">
    <div class="container header-container">
      <a href="/renewal/" class="logo">Portfolio</a>

      <button class="menu-toggle" aria-label="メニューを開く" aria-expanded="false">
        ☰
      </button>

      <nav>
        <ul class="nav-list">
          <li><a href="/renewal/" class="nav-link">Home</a></li>
          <li><a href="/renewal/work/" class="nav-link">Work</a></li>
          <li><a href="/renewal/projects/" class="nav-link">Projects</a></li>
          <li><a href="/renewal/writing/" class="nav-link">Writing</a></li>
          <li><a href="/renewal/about/" class="nav-link">About</a></li>
          <li><a href="/renewal/photo/" class="nav-link">Photo</a></li>
          <li><a href="/renewal/contact/" class="nav-link">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container">
        <div class="section-header">
          <h1 class="section-title">Projects</h1>
          <p class="section-subtitle">開発プロジェクト一覧</p>
        </div>

        <!-- Featured Projects -->
        <div style="margin-bottom: var(--space-16);">
          <h2 style="font-size: var(--text-3xl); margin-bottom: var(--space-8);">Featured</h2>
          <div id="featured-projects" class="grid grid-3">
            <!-- Loaded by JavaScript -->
          </div>
        </div>

        <!-- All Projects -->
        <div class="film-border">
          <h2 style="font-size: var(--text-3xl); margin-bottom: var(--space-8);">All Projects</h2>
          <div id="all-projects" class="grid grid-3">
            <!-- Loaded by JavaScript -->
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-section">
          <h3 class="footer-title">Navigate</h3>
          <div class="footer-links">
            <a href="/renewal/" class="footer-link">Home</a>
            <a href="/renewal/work/" class="footer-link">Work</a>
            <a href="/renewal/projects/" class="footer-link">Projects</a>
            <a href="/renewal/writing/" class="footer-link">Writing</a>
            <a href="/renewal/about/" class="footer-link">About</a>
            <a href="/renewal/contact/" class="footer-link">Contact</a>
          </div>
        </div>

        <div class="footer-section">
          <h3 class="footer-title">Connect</h3>
          <div class="footer-links">
            <a href="https://github.com/syukan3" target="_blank" rel="noopener noreferrer" class="footer-link">GitHub</a>
            <a href="https://qiita.com/syukan3" target="_blank" rel="noopener noreferrer" class="footer-link">Qiita</a>
          </div>
        </div>

        <div class="footer-section">
          <h3 class="footer-title">Info</h3>
          <p class="text-muted" style="font-size: var(--text-sm);">
            Toy Camera Noir<br>
            Portfolio 2025
          </p>
        </div>
      </div>

      <div class="footer-bottom">
        <p>&copy; 2025 Sakae Shunsuke. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="/renewal/js/main.js"></script>
  <script src="/renewal/js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      Components.showSkeleton('featured-projects', 6);
      Components.showSkeleton('all-projects', 6);

      const projects = await DataLoader.getProjects();

      const featured = projects.filter(p => p.featured);
      const all = projects.filter(p => !p.featured);

      Components.renderItems('featured-projects', featured, Components.createProjectCard);
      Components.renderItems('all-projects', all, Components.createProjectCard);
    });
  </script>
</body>
</html>
