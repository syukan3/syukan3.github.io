<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="ページが見つかりません - 栄 俊介">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#0b0a08">
  <title>404 - Page Not Found | 栄 俊介</title>

  <link rel="icon" type="image/svg+xml" href="/renewal/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Shippori+Mincho:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/renewal/css/reset.css?v=20260611">
  <link rel="stylesheet" href="/renewal/css/variables.css?v=20260611">
  <link rel="stylesheet" href="/renewal/css/base.css?v=20260611">
  <link rel="stylesheet" href="/renewal/css/components.css?v=20260612">

  <style>
    .error-page {
      min-height: calc(100vh - var(--header-height) - var(--space-24));
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: var(--space-8);
    }
    .error-content { max-width: 540px; }
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 800; line-height: 1;
      color: var(--color-ember-bright);
      text-shadow: 0 0 60px rgba(224, 164, 90, 0.4);
      margin-bottom: var(--space-4);
    }
    .error-title { font-size: var(--text-3xl); margin-bottom: var(--space-4); color: var(--color-cream); }
    .error-description { font-size: var(--text-lg); color: var(--color-text-secondary); margin-bottom: var(--space-8); line-height: var(--leading-relaxed); }
    .error-actions { display: flex; flex-direction: column; gap: var(--space-3); align-items: center; }
    @media (min-width: 540px) { .error-actions { flex-direction: row; justify-content: center; } }
  </style>
</head>
<body data-page="">
  <a href="#main-content" class="skip-link">メインコンテンツへスキップ</a>
  <div id="site-header"></div>

  <div class="noir-frame">
    <main id="main-content">
      <section class="error-page">
        <div class="error-content">
          <div class="viewfinder">
            <p class="error-code">404</p>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-description">
              お探しのページは見つかりませんでした。<br>
              URLが間違っているか、ページが移動または削除された可能性があります。
            </p>
            <div class="error-actions">
              <a href="/renewal/" class="btn btn-primary">ホームへ戻る</a>
              <a href="/renewal/contact/" class="btn btn-secondary">お問い合わせ</a>
            </div>
          </div>
        </div>
      </section>
    </main>
    <div id="site-footer"></div>
  </div>

  <script src="/renewal/js/main.js?v=20260611"></script>
</body>
</html>
