<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" role="img" aria-label="生成AI × ガバナンス">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b1916"/>
      <stop offset="1" stop-color="#0a0807"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#ff8a42" stop-opacity="0.45"/>
      <stop offset="0.55" stop-color="#ff8a42" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="node" cx="0.4" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#f6cf86"/>
      <stop offset="1" stop-color="#a7742e"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="800" fill="url(#bg)"/>
  <rect width="1280" height="800" fill="url(#glow)"/>

  <!-- viewfinder brackets -->
  <g stroke="#cdbf9f" stroke-width="4" fill="none" opacity="0.55">
    <path d="M70 110 H40 V140"/>
    <path d="M1210 110 H1240 V140"/>
    <path d="M70 690 H40 V660"/>
    <path d="M1210 690 H1240 V660"/>
  </g>

  <!-- governance shield -->
  <g transform="translate(640 400)">
    <path d="M0 -150 L150 -95 V25 C150 120 80 175 0 210 C-80 175 -150 120 -150 25 V-95 Z"
          fill="rgba(224,164,90,0.07)" stroke="#e0a45a" stroke-width="3"/>
    <path d="M-58 5 L-18 48 L70 -55" fill="none" stroke="#f6cf86" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- AI flow nodes (left) feeding into shield -->
  <g stroke="#cdbf9f" stroke-width="2" opacity="0.5">
    <line x1="250" y1="300" x2="470" y2="380"/>
    <line x1="250" y1="430" x2="470" y2="400"/>
    <line x1="250" y1="540" x2="470" y2="430"/>
  </g>
  <g fill="url(#node)">
    <circle cx="250" cy="300" r="20"/>
    <circle cx="250" cy="430" r="26"/>
    <circle cx="250" cy="540" r="18"/>
  </g>
  <!-- monitored outputs (right) -->
  <g stroke="#cdbf9f" stroke-width="2" opacity="0.5">
    <line x1="810" y1="380" x2="1030" y2="300"/>
    <line x1="810" y1="400" x2="1030" y2="430"/>
    <line x1="810" y1="430" x2="1030" y2="540"/>
  </g>
  <g fill="none" stroke="#e0a45a" stroke-width="3" opacity="0.85">
    <rect x="1010" y="280" width="44" height="44" rx="6"/>
    <rect x="1010" y="410" width="44" height="44" rx="6"/>
    <rect x="1010" y="520" width="44" height="44" rx="6"/>
  </g>

  <!-- filmstrip bottom -->
  <rect x="0" y="752" width="1280" height="48" fill="#060504"/>
  <g fill="#e8e2d2" opacity="0.5">
    <!-- perforations -->
    <g>
      <rect x="20" y="762" width="22" height="10" rx="2"/><rect x="64" y="762" width="22" height="10" rx="2"/>
      <rect x="108" y="762" width="22" height="10" rx="2"/><rect x="152" y="762" width="22" height="10" rx="2"/>
      <rect x="196" y="762" width="22" height="10" rx="2"/><rect x="240" y="762" width="22" height="10" rx="2"/>
      <rect x="284" y="762" width="22" height="10" rx="2"/><rect x="328" y="762" width="22" height="10" rx="2"/>
      <rect x="372" y="762" width="22" height="10" rx="2"/><rect x="416" y="762" width="22" height="10" rx="2"/>
      <rect x="460" y="762" width="22" height="10" rx="2"/><rect x="504" y="762" width="22" height="10" rx="2"/>
      <rect x="548" y="762" width="22" height="10" rx="2"/><rect x="592" y="762" width="22" height="10" rx="2"/>
      <rect x="636" y="762" width="22" height="10" rx="2"/><rect x="680" y="762" width="22" height="10" rx="2"/>
      <rect x="724" y="762" width="22" height="10" rx="2"/><rect x="768" y="762" width="22" height="10" rx="2"/>
      <rect x="812" y="762" width="22" height="10" rx="2"/><rect x="856" y="762" width="22" height="10" rx="2"/>
      <rect x="900" y="762" width="22" height="10" rx="2"/><rect x="944" y="762" width="22" height="10" rx="2"/>
      <rect x="988" y="762" width="22" height="10" rx="2"/><rect x="1032" y="762" width="22" height="10" rx="2"/>
      <rect x="1076" y="762" width="22" height="10" rx="2"/><rect x="1120" y="762" width="22" height="10" rx="2"/>
      <rect x="1164" y="762" width="22" height="10" rx="2"/><rect x="1208" y="762" width="22" height="10" rx="2"/>
      <rect x="1252" y="762" width="22" height="10" rx="2"/>
    </g>
  </g>
</svg>
