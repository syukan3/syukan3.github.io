<body data-page="projects">
  <a href="#main-content" class="skip-link">メインコンテンツへスキップ</a>
  <div id="site-header"></div>

  <div class="noir-frame">
    <main id="main-content">
      <section class="section">
        <div class="container">
          <div class="section-header" data-reveal>
            <span class="section-eyebrow">Projects</span>
            <h1 class="section-title">Projects</h1>
            <p class="section-subtitle">プロダクト・OSS・実験的な取り組みの一覧。</p>
          </div>

          <div class="block">
            <h2 class="bracket-label" style="display:inline-block; margin-bottom: var(--space-6);">Featured</h2>
            <div id="featured-projects" class="grid grid-3"></div>
          </div>

          <div class="filmstrip" aria-hidden="true"></div>

          <div class="block">
            <h2 class="bracket-label" style="display:inline-block; margin-bottom: var(--space-6);">All Projects</h2>
            <div id="all-projects" class="grid grid-3"></div>
          </div>
        </div>
      </section>
    </main>
    <div id="site-footer"></div>
  </div>

  <script src="/js/main.js?v=20260611"></script>
  <script src="/js/components.js?v=20260611"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      Components.showSkeleton('featured-projects', 3);
      Components.showSkeleton('all-projects', 3);

      const projects = await DataLoader.getProjects();
      Components.renderItems('featured-projects', projects.filter(p => p.featured), Components.createProjectCard);
      Components.renderItems('all-projects', projects.filter(p => !p.featured), Components.createProjectCard);
    });
  </script>
</body>
